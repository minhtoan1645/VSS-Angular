<div class="auth__card">
  <app-card cardClass="card--auth">
    <div class="auth-flow__topbar">
      <a class="auth-flow__back" routerLink="/verify-code">
        <span class="auth-flow__back-icon" aria-hidden="true">&#8249;</span>
        <span>Quay lại</span>
      </a>

      <h2 class="auth-flow__topbar-title">Quên mật khẩu</h2>
    </div>

    <div class="card__header">
      <div class="auth-flow__illustration auth-flow__illustration--reset">
        <img src="assets/images/auth/Group 18210.png" alt="Tạo mật khẩu mới" />
      </div>
    </div>

    <div class="card__body auth-flow__body">
      <div class="auth-flow__content auth-flow__content--reset">
        <div class="auth__header auth-flow__header">
          <h3 class="auth__title auth-flow__heading">Tạo mật khẩu mới</h3>
          <p class="auth-flow__desc">
            Mật khẩu mới của bạn phải khác với mật khẩu cũ đã được sử dụng.
          </p>
        </div>

        <div class="auth__form">
          <form class="form" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form__body">
              <div class="form-group">
                <app-input
                  id="new-password"
                  name="newPassword"
                  type="password"
                  label="Mật khẩu mới"
                  labelClass="auth-flow__input-label"
                  wrapperClass="input-password"
                  autocomplete="new-password"
                  [showToggle]="true"
                  [control]="newPasswordControl"
                ></app-input>
              </div>

              <div class="form-group">
                <app-input
                  id="confirm-password"
                  name="confirmPassword"
                  type="password"
                  label="Nhập lại mật khẩu mới"
                  labelClass="auth-flow__input-label"
                  wrapperClass="input-password"
                  autocomplete="new-password"
                  [showToggle]="true"
                  [control]="confirmPasswordControl"
                ></app-input>
                <p
                  *ngIf="resetPasswordForm.hasError('passwordMismatch') && confirmPasswordControl?.touched"
                  class="form-group__error"
                >
                  Hai mật khẩu chưa khớp.
                </p>
              </div>
            </div>

            <div class="form__footer">
              <div class="form__actions form__actions--block">
                <app-button
                  type="submit"
                  buttonClass="btn btn--primary btn--block btn--md auth-flow__submit"
                  label="Xác nhận"
                  [disabled]="resetPasswordForm.invalid"
                ></app-button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </app-card>
</div>
