<div class="auth__card">
  <app-card cardClass="card--auth">
    <div class="auth-flow__topbar">
      <a class="auth-flow__back" routerLink="/forgot-password">
        <span class="auth-flow__back-icon" aria-hidden="true">&#8249;</span>
        <span>Quay lại</span>
      </a>

      <h2 class="auth-flow__topbar-title">Quên mật khẩu</h2>
    </div>

    <div class="card__header">
      <div class="auth-flow__illustration auth-flow__illustration--verify">
        <img src="assets/images/auth/Group 18209.png" alt="Kiểm tra mail" />
      </div>
    </div>

    <div class="card__body auth-flow__body">
      <div class="auth-flow__content auth-flow__content--verify">
        <div class="auth__header auth-flow__header">
          <h3 class="auth__title auth-flow__heading">Kiểm tra mail</h3>
          <p class="auth-flow__desc">
            Chúng tôi đã gửi cho bạn mã xác nhận. Vui lòng kiểm tra mã trong email của bạn.
          </p>
        </div>

        <div class="auth__form">
          <form class="form" [formGroup]="verifyCodeForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form__body">
              <div class="form-group">
                <div class="auth-flow__code-row">
                  <app-input
                    id="verify-code"
                    name="verifyCode"
                    label="Nhập mã xác thực"
                    placeholder="Nhập mã"
                    inputClass="input auth-flow__code-input"
                    [control]="verifyCodeControl"
                    inputMode="numeric"
                    autocomplete="one-time-code"
                  ></app-input>
                  <button class="btn btn--outline auth-flow__resend" type="button" (click)="resendCode()">
                    Gửi lại mã
                  </button>
                </div>
              </div>
            </div>

            <div class="form__footer">
              <div class="form__actions form__actions--block">
                <app-button
                  type="submit"
                  buttonClass="btn btn--primary btn--block btn--md auth-flow__submit"
                  label="Tiếp tục"
                  [disabled]="verifyCodeForm.invalid"
                ></app-button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </app-card>
</div>
