<div class="auth__card">
  <app-card cardClass="card--auth">
    <div class="auth-flow__topbar">
      <a class="auth-flow__back" routerLink="/login">
        <span class="auth-flow__back-icon" aria-hidden="true">&#8249;</span>
        <span>Quay lại</span>
      </a>

      <h2 class="auth-flow__topbar-title">Quên mật khẩu</h2>
    </div>

    <div class="card__header">
      <div class="auth-flow__illustration">
        <img src="assets/images/auth/Group 18198.png" alt="Khôi phục mật khẩu" />
      </div>
    </div>

    <div class="card__body auth-flow__body">
      <div class="auth-flow__content">
        <div class="auth__header auth-flow__header">
          <h3 class="auth__title auth-flow__heading">Bạn đã quên mật khẩu?</h3>
          <p class="auth-flow__desc">
            Đừng lo lắng, hãy nhập tài khoản hoặc email của bạn ở dưới để tìm kiếm tài khoản của bạn
          </p>
        </div>

        <div class="auth__form">
          <form class="form" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form__body">
              <div class="form-group">
                <app-input
                  id="account-email"
                  name="accountEmail"
                  type="email"
                  label="Tài khoản hoặc email"
                  placeholder="Nhập tài khoản/email"
                  autocomplete="email"
                  [control]="accountEmailControl"
                ></app-input>
              </div>
            </div>

            <div class="form__footer">
              <div class="form__actions form__actions--block">
                <app-button
                  type="submit"
                  buttonClass="btn btn--primary btn--block btn--md auth-flow__submit"
                  label="Tiếp tục"
                  [disabled]="forgotPasswordForm.invalid"
                ></app-button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </app-card>
</div>
