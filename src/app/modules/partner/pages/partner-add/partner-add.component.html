<section class="add-partner" [formGroup]="partnerForm">
  <aside class="add-partner__stepper" aria-label="Quy trình thêm đối tác">
    <button class="add-partner__back" type="button" (click)="goBack()" aria-label="Quay lại danh sách đối tác">
      <span class="add-partner__back-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20">
          <path d="m12 5-5 5 5 5" />
        </svg>
      </span>
      <span>Thêm đối tác</span>
    </button>

    <app-partner-stepper
      [steps]="steps"
      [currentMainStep]="currentMainStep"
      [currentSubStep]="currentSubStep"
      [completedSubSteps]="completedSubSteps"
      (stepSelect)="goToStep($event)"
    ></app-partner-stepper>
  </aside>

  <main class="add-partner__content">
    <img
      class="add-partner__city"
      src="assets/images/add-partner/Group 18239.png"
      alt=""
      aria-hidden="true"
    />

    <form *ngIf="currentMainStep === 1" class="partner-form" novalidate>
      <h1>Tạo thông tin đối tác</h1>

      <div class="partner-form__grid">
        <label class="partner-field partner-field--full">
          <span>Tên đối tác <strong>*</strong></span>
          <span
            class="partner-control partner-control--filled"
            [class.partner-control--has-value]="hasControlValue('partnerName')"
            [class.partner-control--invalid]="isControlInvalid('partnerName')"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12.5a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Z" />
              <path d="M4.75 20a7.25 7.25 0 0 1 14.5 0" />
            </svg>
            <input formControlName="partnerName" type="text" placeholder="Nhập tên đối tác" />
          </span>
        </label>

        <label class="partner-field">
          <span>Số điện thoại <strong>*</strong></span>
          <span
            class="partner-control partner-control--filled"
            [class.partner-control--has-value]="hasControlValue('phone')"
            [class.partner-control--invalid]="isControlInvalid('phone')"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7.2 4.8 9.5 4l2 4.7-1.7 1.1a12.7 12.7 0 0 0 4.4 4.4l1.1-1.7 4.7 2-.8 2.3c-.3.9-1.2 1.5-2.1 1.3C10.9 17.2 6.8 13.1 5.9 6.9c-.2-.9.4-1.8 1.3-2.1Z" />
            </svg>
            <input formControlName="phone" type="tel" placeholder="xxx-xxx-xxxx" />
          </span>
        </label>

        <label class="partner-field">
          <span>Email <strong>*</strong></span>
          <span
            class="partner-control partner-control--filled"
            [class.partner-control--has-value]="hasControlValue('email')"
            [class.partner-control--invalid]="isControlInvalid('email')"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5.5" width="16" height="13" rx="2" />
              <path d="m5.5 8 6.5 5 6.5-5" />
            </svg>
            <input formControlName="email" type="email" placeholder="abc@gmail.com" />
          </span>
        </label>

        <label class="partner-field partner-field--full">
          <span>Loại hình doanh nghiệp <strong>*</strong></span>
          <span
            class="partner-control partner-control--select partner-control--filled"
            [class.partner-control--has-value]="hasControlValue('businessType')"
            [class.partner-control--invalid]="isControlInvalid('businessType')"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 20V6.5L12 4l5 2.5V20M5 20h14M10 9h1M13 9h1M10 12h1M13 12h1M10 15h1M13 15h1" />
            </svg>
            <select formControlName="businessType">
              <option value="">Chọn loại hình</option>
              <option *ngFor="let type of businessTypes" [value]="type">{{ type }}</option>
            </select>
          </span>
        </label>

        <label class="partner-field partner-field--full">
          <span>Lĩnh vực <strong>*</strong></span>
          <span
            class="partner-control partner-control--select partner-control--tags partner-control--filled"
            [class.partner-control--has-value]="hasControlValue('industries')"
            [class.partner-control--invalid]="isControlInvalid('industries')"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 8.5h10l1 10H6l1-10Z" />
              <path d="M9.5 8.5a2.5 2.5 0 0 1 5 0" />
            </svg>
            <button
              class="partner-tags"
              type="button"
              aria-haspopup="listbox"
              [attr.aria-expanded]="isFieldPickerOpen"
              (click)="toggleFieldPicker()"
            >
              <span *ngFor="let field of selectedFields" class="partner-tags__item">
                {{ field }}
                <span
                  class="partner-tags__remove"
                  role="button"
                  tabindex="0"
                  (click)="removeField(field); $event.stopPropagation()"
                  [attr.aria-label]="'Xóa ' + field"
                >
                  ×
                </span>
              </span>
              <span *ngIf="!selectedFields.length" class="partner-tags__placeholder">Chọn lĩnh vực</span>
            </button>

            <div *ngIf="isFieldPickerOpen" class="partner-field-menu" role="listbox" aria-label="Chọn lĩnh vực">
              <label *ngFor="let field of fields" class="partner-field-menu__item">
                <input
                  type="checkbox"
                  [checked]="isFieldSelected(field)"
                  (change)="toggleField(field)"
                />
                <span>{{ field }}</span>
              </label>
            </div>
          </span>
        </label>

        <label class="partner-field">
          <span>Tỉnh/Thành phố</span>
          <span class="partner-control partner-control--select">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s6-5.3 6-11a6 6 0 0 0-12 0c0 5.7 6 11 6 11Z" />
              <circle cx="12" cy="10" r="2.2" />
            </svg>
            <select formControlName="city">
              <option value="">Chọn tỉnh/thành phố</option>
              <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
            </select>
          </span>
        </label>

        <label class="partner-field">
          <span>Quận/Huyện</span>
          <span class="partner-control partner-control--select">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s6-5.3 6-11a6 6 0 0 0-12 0c0 5.7 6 11 6 11Z" />
              <circle cx="12" cy="10" r="2.2" />
            </svg>
            <select formControlName="district">
              <option value="">Chọn quận/huyện</option>
              <option *ngFor="let district of districts" [value]="district">{{ district }}</option>
            </select>
          </span>
        </label>

        <label class="partner-field">
          <span>Phường/Xã</span>
          <span class="partner-control partner-control--select">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s6-5.3 6-11a6 6 0 0 0-12 0c0 5.7 6 11 6 11Z" />
              <circle cx="12" cy="10" r="2.2" />
            </svg>
            <select formControlName="ward">
              <option value="">Chọn phường/xã</option>
              <option *ngFor="let ward of wards" [value]="ward">{{ ward }}</option>
            </select>
          </span>
        </label>

        <label class="partner-field">
          <span>Địa chỉ</span>
          <span class="partner-control">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 6.5 10 4l4 2 5-2.5v14l-5 2.5-4-2-5 2.5v-14Z" />
              <path d="M10 4v14M14 6v14" />
            </svg>
            <input formControlName="address" type="text" placeholder="Nhập địa chỉ cụ thể" />
          </span>
        </label>
      </div>

      <div class="add-partner__actions">
        <button class="add-partner__button add-partner__button--outline" type="button" (click)="cancel()">Hủy bỏ</button>
        <button
          class="add-partner__button add-partner__button--primary"
          type="button"
          [disabled]="partnerForm.invalid"
          (click)="goNext()"
        >
          Tiếp tục
        </button>
      </div>
    </form>

    <section *ngIf="currentMainStep === 2" class="package-step" aria-labelledby="package-step-title">
      <header class="package-step__header">
        <h1 id="package-step-title">Chọn gói dịch vụ</h1>
        <div class="billing-tabs" role="tablist" aria-label="Thời hạn thanh toán">
          <button
            *ngFor="let cycle of billingCycles"
            type="button"
            role="tab"
            [class.billing-tabs__item--active]="selectedBillingCycle === cycle.id"
            [attr.aria-selected]="selectedBillingCycle === cycle.id"
            class="billing-tabs__item"
            (click)="selectBillingCycle(cycle.id)"
          >
            {{ cycle.label }}
          </button>
        </div>
      </header>

      <div class="pricing-grid">
        <app-pricing-card
          *ngFor="let plan of pricingPlans; trackBy: trackByPlanId"
          [plan]="plan"
          [selected]="selectedPackageId === plan.id"
          (planSelect)="selectPackage($event)"
        ></app-pricing-card>
      </div>

      <div class="add-partner__actions package-step__actions">
        <button class="add-partner__button add-partner__button--outline" type="button" (click)="cancel()">Hủy bỏ</button>
        <button class="add-partner__button add-partner__button--primary" type="button" (click)="submitForm()">Hoàn thành</button>
      </div>
    </section>
  </main>
</section>
