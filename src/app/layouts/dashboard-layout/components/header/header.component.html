<header class="dashboard-header">
  <div class="dashboard-header__tab">
    <img [src]="iconSrc" alt="" />
    <span>{{ title }}</span>
    <button type="button" aria-label="Đóng tab">×</button>
  </div>

  <div class="dashboard-header__actions">
    <button class="dashboard-header__notification" type="button" aria-label="Thông báo">
      <img src="assets/images/icons/notification.png" alt="" />
      <span></span>
    </button>

    <div class="profile-menu">
      <button
        class="dashboard-header__avatar"
        type="button"
        aria-label="Tài khoản"
        aria-haspopup="menu"
        [attr.aria-expanded]="isProfileMenuOpen"
        (click)="toggleProfileMenu()"
      >
        <span class="dashboard-header__avatar-photo"></span>
        <span [class]="getAvatarStatusClass()"></span>
      </button>

      <section *ngIf="isProfileMenuOpen" class="profile-menu__panel" role="menu" aria-label="Menu tài khoản">
        <div class="profile-menu__summary">
          <span class="profile-menu__avatar-photo" aria-hidden="true"></span>
          <div>
            <h2>{{ profile.name }}</h2>
            <p>{{ profile.role }}</p>
          </div>
        </div>

        <div class="profile-menu__status-wrap">
          <button
            [class]="getProfileStatusClass()"
            type="button"
            aria-haspopup="listbox"
            [attr.aria-expanded]="isStatusMenuOpen"
            (click)="toggleStatusMenu()"
          >
            <span></span>
            {{ selectedProfileStatus }}
          </button>

          <div *ngIf="isStatusMenuOpen" class="profile-menu__status-list" role="listbox" aria-label="Trạng thái tài khoản">
            <button
              *ngFor="let status of profileStatuses"
              [class]="'profile-menu__status-option ' + getProfileStatusToneClass(status)"
              type="button"
              role="option"
              [attr.aria-selected]="selectedProfileStatus === status"
              (click)="setProfileStatus(status)"
            >
              <span></span>
              {{ status }}
            </button>
          </div>
        </div>

        <button class="profile-menu__item" type="button" role="menuitem">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="7" r="4" />
            <path d="M5 21a7 7 0 0 1 14 0" />
          </svg>
          Thông tin cá nhân
        </button>
        <button class="profile-menu__item" type="button" role="menuitem">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.5v2M12 18.5v2M4.6 7.5l1.7 1M17.7 15.5l1.7 1M4.6 16.5l1.7-1M17.7 8.5l1.7-1" />
            <circle cx="12" cy="12" r="3.5" />
            <path d="M19 12a7 7 0 0 0-.1-1.1l2-1.5-2-3.4-2.4 1a7.8 7.8 0 0 0-1.9-1.1L14.3 3h-4.6l-.4 2.9A7.8 7.8 0 0 0 7.5 7l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.1l-2 1.5 2 3.4 2.4-1a7.8 7.8 0 0 0 1.9 1.1l.4 2.9h4.6l.4-2.9a7.8 7.8 0 0 0 1.9-1.1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1.1Z" />
          </svg>
          Cài đặt
        </button>
        <button class="profile-menu__item profile-menu__item--danger" type="button" role="menuitem" (click)="openLogoutModal()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 17l5-5-5-5M20 12H9" />
            <path d="M12 20H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h7" />
          </svg>
          Đăng xuất
        </button>
      </section>
    </div>
  </div>
</header>

<div *ngIf="isLogoutModalOpen" class="modal-overlay" role="presentation">
  <section class="modal-panel modal-panel--confirm" role="dialog" aria-modal="true" aria-labelledby="logout-title">
    <button class="modal-panel__close modal-panel__close--floating" type="button" aria-label="Đóng" (click)="closeLogoutModal()">×</button>
    <h2 id="logout-title">Bạn có chắc chắn muốn thoát không?</h2>

    <footer class="modal-panel__actions modal-panel__actions--center">
      <button class="btn btn--outline modal-button modal-button--wide" type="button" (click)="closeLogoutModal()">
        Tiếp tục đăng nhập
      </button>
      <button class="btn btn--primary modal-button" type="button" (click)="confirmLogout()">Đăng xuất</button>
    </footer>
  </section>
</div>
